<!doctype html>
<html lang="en">
  <head>
    <!-- ngx-theme-stack anti-flash -->
    <script>
      (function () {
        try {
          var k = 'ngx-theme-stack',
            d = 'sunset',
            m = 'class',
            t = localStorage.getItem(k) || d,
            e = document.documentElement;
          if (!/^[a-zA-Z][a-zA-Z0-9_-]*$/.test(t)) t = d;
          if (t === 'system')
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          if (m === 'class' || m === 'both') e.classList.add(t);
          if (m === 'attribute' || m === 'both') e.setAttribute('data-theme', t);
          if (t === 'dark' || t === 'light') e.style.setProperty('color-scheme', t);
        } catch (x) {}
      })();
    </script>
    <meta charset="utf-8" />
    <title>ngx-theme-stack — Powerful Angular Theme Management</title>
    <base href="/" />
    <link rel="canonical" href="https://demo-ngx-theme-stack.wanderlee.site/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
      rel="stylesheet"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO & Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ngx-theme-stack — Powerful Angular Theme Management" />
    <meta
      property="og:description"
      content="Seamlessly manage light, dark, and custom themes in Angular with Zero-Flash performance and Tailwind CSS v4 support."
    />
    <meta property="og:image" content="banner.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ngx-theme-stack — Powerful Angular Theme Management" />
    <meta
      name="twitter:description"
      content="Seamlessly manage light, dark, and custom themes in Angular with Zero-Flash performance and Tailwind CSS v4 support."
    />
    <meta name="twitter:image" content="banner.png" />
    <link rel="icon" type="image/png" href="favicon.png" />
  </head>
  <body>
    <app-root></app-root>

    <!-- ngx-theme-stack critters-trick -->
    <div
      id="ngx-theme-stack-critters-trick"
      hidden
      aria-hidden="true"
      style="display: none; overflow: hidden; clip-path: inset(50%); position: absolute"
    >
      <div class="light"></div>
      <div class="dark"></div>
      <div class="sunset"></div>
    </div>
    <!-- /ngx-theme-stack critters-trick -->
  </body>
</html>
