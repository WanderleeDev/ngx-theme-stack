<!doctype html>
<html lang="en">
  <head>
    <!-- ngx-theme-stack anti-flash -->
    <script>
      (function(){try{
        var k='ngx-theme-stack-theme',
            d='system',
            m='attribute',
            t=localStorage.getItem(k)||d,
            e=document.documentElement;
        if(!/^[a-zA-Z][a-zA-Z0-9_-]*$/.test(t))t=d;
        if(t==='system')t=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
        if(m==='class'||m==='both')e.classList.add(t);
        if(m==='attribute'||m==='both')e.setAttribute('data-theme',t);
        if(t==='dark'||t==='light')e.style.setProperty('color-scheme',t);
      }catch(x){}})();
    </script>
    <meta charset="utf-8" />
    <title>DemoNgxThemeStack</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/webp" href="favicon.webp" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
