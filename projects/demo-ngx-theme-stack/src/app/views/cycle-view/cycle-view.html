<app-theme-switcher ngProjectAs="top-nav" />

<app-theme-card-wrapper>
  <div header class="space-y-4">
    <h1
      class="text-4xl md:text-5xl font-black tracking-tighter text-text-main transition-colors leading-none"
    >
      Sequence
    </h1>
    <app-theme-status
      [resolved]="resolvedTheme()"
      [selected]="selectedTheme()"
      [isHydrated]="themeService.isHydrated()"
    />
  </div>

  <div class="flex items-center gap-10 md:gap-16 mt-4">
    <!-- Previous (Left) -->
    <div
      class="flex flex-col items-center opacity-20 hover:opacity-50 transition-opacity select-none"
    >
      <span class="text-[10px] uppercase font-bold tracking-widest mb-1">Antes</span>
      <span class="text-xs font-bold capitalize text-text-main">{{ precedingTheme() }}</span>
    </div>

    <!-- Current Button -->
    <button
      (click)="nextTheme()"
      aria-label="Cycle to next theme"
      class="group relative flex items-center justify-center w-20 h-20 bg-btn-bg text-btn-text rounded-full transition-all duration-200 active:scale-95 shadow-btn cursor-pointer"
    >
      <span
        class="material-symbols-outlined text-4xl transition-transform duration-500 group-hover:rotate-180"
      >
        sync
      </span>
    </button>

    <!-- Next (Right) -->
    <div class="flex flex-col items-center select-none">
      <span class="text-[10px] uppercase font-bold tracking-widest mb-1 text-text-main/40"
        >Sigue</span
      >
      <span class="text-base font-black capitalize text-text-main tracking-tight">{{
        upcomingTheme()
      }}</span>
      <div class="w-full h-0.5 bg-text-main/20 rounded-full mt-1"></div>
    </div>
  </div>
</app-theme-card-wrapper>
