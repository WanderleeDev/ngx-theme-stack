<app-theme-card-wrapper>
  <div header class="space-y-4">
    <h1
      class="text-4xl md:text-5xl font-black tracking-tighter text-slate-900 dark:text-white transition-colors duration-300 leading-none"
    >
      Select
    </h1>
    <app-theme-status
      [resolved]="resolvedTheme()"
      [selected]="selectedTheme()"
      [isHydrated]="themeService.isHydrated()"
    />
  </div>
  @if (themeService.isHydrated()) {
    <div class="grid grid-cols-2 gap-4 w-full px-4">
      @for (theme of themeService.availableThemes; track theme) {
        <button
          (click)="selectTheme(theme)"
          [attr.aria-label]="'Select theme ' + theme"
          class="group flex flex-col items-center justify-center p-4 rounded-3xl transition-all duration-300 active:scale-95 border-2 cursor-pointer"
          [class.bg-white/20]="theme === themeService.selectedTheme()"
          [class.border-white/40]="theme === themeService.selectedTheme()"
          [class.border-transparent]="theme !== themeService.selectedTheme()"
          [class.bg-black/5]="theme !== themeService.selectedTheme() && !themeService.isDark()"
          [class.bg-white/5]="theme !== themeService.selectedTheme() && themeService.isDark()"
        >
          <span class="material-symbols-outlined text-2xl mb-1 opacity-60 dark:opacity-40">
            palette
          </span>
          <span class="text-[10px] font-black uppercase tracking-widest">
            {{ theme }}
          </span>
        </button>
      }
    </div>
  } @else {
    cargando...
  }
</app-theme-card-wrapper>
