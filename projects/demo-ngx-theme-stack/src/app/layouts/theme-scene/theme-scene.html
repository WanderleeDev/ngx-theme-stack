<main class="relative min-h-screen w-full flex items-center justify-center overflow-hidden transition-all duration-1000 bg-sky-200 dark:bg-linear-to-r dark:from-[#020617] dark:via-[#1e3a8a] dark:to-[#020617]">

  <!-- Animated Background Elements -->
  <div class="absolute inset-0 pointer-events-none">

    <!-- Sun -->
    <div class="absolute top-20 left-20 w-32 h-32 rounded-full bg-yellow-400 shadow-[0_0_80px_rgba(250,204,21,0.6)]
                transition-all duration-1000 ease-in-out
                translate-y-0 opacity-100 dark:-translate-y-40 dark:opacity-0">
      <div class="absolute inset-0 rounded-full animate-pulse bg-yellow-300 opacity-50 blur-xl"></div>
    </div>

    <!-- Moon -->
    <div class="absolute top-20 right-20 w-28 h-28 rounded-full bg-slate-200 shadow-[0_0_50px_rgba(226,232,240,0.4)]
                transition-all duration-1000 ease-in-out
                translate-y-40 opacity-0 dark:translate-y-0 dark:opacity-100">
      <div class="absolute top-4 left-6 w-8 h-8 rounded-full bg-slate-300 opacity-40"></div>
      <div class="absolute top-12 left-12 w-6 h-6 rounded-full bg-slate-300 opacity-40"></div>
    </div>

    <!-- Deep Night Stars (80) -->
    <div class="absolute inset-0 opacity-0 dark:opacity-100 transition-all duration-1000 ease-in pointer-events-none">
      @for (star of stars; track $index) {
        <div
          class="absolute bg-white rounded-full shadow-[0_0_8px_rgba(255,255,255,0.8)]"
          [style.top]="star.top"
          [style.left]="star.left"
          [style.width]="star.size"
          [style.height]="star.size"
          [style.animation-delay]="star.delay"
          [style.animation-duration]="star.duration"
        ></div>
      }
    </div>

    <!-- Soft Morning Clouds (5) -->
    <div class="absolute inset-0 transition-opacity duration-500 opacity-100 dark:opacity-0">
      @for (cloud of clouds; track $index) {
        <div
          [class]="'absolute w-28 h-10 bg-white/70 rounded-full blur-xs shadow-sm ' + cloud.animation"
          [style.top]="cloud.top"
          [style.left]="cloud.left"
          [style.animation-delay]="cloud.delay"
        >
          <div class="absolute -top-4 left-6 w-12 h-12 bg-white rounded-full"></div>
          <div class="absolute -top-3 left-14 w-10 h-10 bg-white rounded-full"></div>
        </div>
      }
    </div>
  </div>

  <div class="z-50 fixed top-6 left-1/2 -translate-x-1/2 flex flex-col items-center gap-4">
    <!-- Brand Logo -->
    <div class="flex items-center gap-2 group cursor-default transition-all duration-700 hover:scale-105">
      <img src="favicon.webp" alt="ngx-theme-stack logo" class="w-8 h-8 rounded-lg shadow-lg group-hover:rotate-12 transition-transform duration-500">
      <span class="text-lg font-black tracking-tighter text-slate-800 dark:text-white transition-colors duration-1000">
        ngx-theme-stack
      </span>
    </div>

    <div class="scale-75 md:scale-100">
      <app-theme-switcher />
    </div>
  </div>
  <router-outlet />

  <!-- Footer -->
  <footer class="z-50 fixed bottom-0 inset-x-0 py-3 md:py-4 flex flex-col md:flex-row items-center justify-center gap-1 md:gap-4 text-[10px] md:text-xs text-slate-600 dark:text-white/70 tracking-wide backdrop-blur-sm bg-white/5 dark:bg-black/10 p-2 md:p-0">
    <span>Built by <strong class="font-bold">WanderleeDev</strong></span>
    <div class="flex items-center gap-3">
      <a href="#" class="hover:text-slate-900 dark:hover:text-white transition-colors underline underline-offset-2 decoration-dotted">Docs</a>
      <span class="opacity-40 hidden md:inline">·</span>
      <a href="#" class="hover:text-slate-900 dark:hover:text-white transition-colors underline underline-offset-2 decoration-dotted">GitHub</a>
      <span class="opacity-40 hidden md:inline">·</span>
      <a href="#" class="hover:text-slate-900 dark:hover:text-white transition-colors underline underline-offset-2 decoration-dotted">NPM</a>
    </div>
  </footer>
</main>
