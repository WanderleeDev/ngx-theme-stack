<main class="relative min-h-screen w-full flex items-center justify-center overflow-hidden transition-all duration-1000 bg-sky-200 dark:bg-gradient-to-b dark:from-slate-950 dark:via-purple-950 dark:to-slate-900">
  
  <!-- Animated Background Elements -->
  <div class="absolute inset-0 pointer-events-none">
    
    <!-- Sun -->
    <div class="absolute top-20 left-20 w-32 h-32 rounded-full bg-yellow-400 shadow-[0_0_80px_rgba(250,204,21,0.6)] 
                transition-all duration-1000 ease-in-out
                translate-y-0 opacity-100 dark:-translate-y-40 dark:opacity-0">
      <div class="absolute inset-0 rounded-full animate-pulse bg-yellow-300 opacity-50 blur-xl"></div>
    </div>

    <!-- Moon -->
    <div class="absolute top-20 right-20 w-28 h-28 rounded-full bg-slate-200 shadow-[0_0_50px_rgba(226,232,240,0.4)]
                transition-all duration-1000 ease-in-out
                translate-y-40 opacity-0 dark:translate-y-0 dark:opacity-100">
      <div class="absolute top-4 left-6 w-8 h-8 rounded-full bg-slate-300 opacity-40"></div>
      <div class="absolute top-12 left-12 w-6 h-6 rounded-full bg-slate-300 opacity-40"></div>
    </div>

    <!-- Stars -->
    <div class="absolute inset-0 opacity-0 dark:opacity-100 transition-all duration-300 ease-in">
      <div class="absolute top-1/4 left-1/3 w-1 h-1 bg-white rounded-full animate-ping"></div>
      <div class="absolute top-1/2 left-1/4 w-1 h-1 bg-white rounded-full animate-pulse delay-75"></div>
      <div class="absolute top-1/3 right-1/4 w-1 h-1 bg-white rounded-full animate-pulse delay-500"></div>
      <div class="absolute bottom-1/4 left-1/2 w-1 h-1 bg-white rounded-full animate-ping delay-1000"></div>
    </div>

    <!-- Clouds -->
    <div class="absolute inset-0 transition-opacity duration-0 opacity-100 dark:opacity-0">
      <div class="absolute top-[25%] left-[20%] w-24 h-8 bg-white/80 rounded-full blur-[2px] shadow-sm animate-[bounce_8s_infinite]">
        <div class="absolute -top-3 left-4 w-10 h-10 bg-white rounded-full"></div>
        <div class="absolute -top-2 left-10 w-8 h-8 bg-white rounded-full"></div>
      </div>
      <div class="absolute top-[15%] right-[25%] w-28 h-10 bg-white/70 rounded-full blur-[3px] shadow-sm animate-[bounce_12s_infinite]">
        <div class="absolute -top-4 left-6 w-12 h-12 bg-white rounded-full"></div>
        <div class="absolute -top-3 left-14 w-10 h-10 bg-white rounded-full"></div>
      </div>
      <div class="absolute bottom-[35%] left-[15%] w-20 h-6 bg-white/60 rounded-full blur-[4px] shadow-sm animate-[bounce_10s_infinite]">
        <div class="absolute -top-3 left-5 w-8 h-8 bg-white rounded-full"></div>
      </div>
    </div>
  </div>

  <!-- Content Projection for the Card -->
  <ng-content></ng-content>

</main>
