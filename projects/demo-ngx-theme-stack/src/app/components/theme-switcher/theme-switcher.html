<div
  class="flex items-center bg-white/10 dark:bg-black/20 backdrop-blur-md rounded-2xl p-1 gap-1 border border-white/10 shadow-lg"
>
  @for (mode of modes; track mode.path) {
    <a
      [id]="'nav-' + mode.id"
      [routerLink]="mode.path"
      routerLinkActive="bg-white/20 text-slate-900 dark:text-white shadow-sm"
      #rla="routerLinkActive"
      class="flex items-center gap-2 px-3 md:px-6 py-2 md:py-2.5 rounded-xl transition-all duration-300 text-sm font-bold tracking-tight cursor-pointer"
      [class.hover:scale-105]="!rla.isActive"
      [class.bg-white/20]="rla.isActive"
      [class.shadow-sm]="rla.isActive"
      [class.text-slate-900]="rla.isActive"
      [class.dark:text-white]="rla.isActive"
      [class.text-slate-600]="!rla.isActive"
      [class.dark:text-white/60]="!rla.isActive"
      [class.hover:bg-white/10]="!rla.isActive"
      [class.hover:text-slate-900]="!rla.isActive"
      [class.dark:hover:text-white]="!rla.isActive"
    >
      <span class="material-symbols-outlined text-[20px]">
        {{ mode.icon }}
      </span>
      <span class="hidden md:inline">{{ mode.label }}</span>
    </a>
  }
</div>
