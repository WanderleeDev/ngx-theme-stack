<div 
  class="z-10 bg-white/10 dark:bg-black/20 backdrop-blur-2xl border border-white/20 dark:border-white/10 p-12 rounded-[4rem] shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] flex flex-col items-center gap-10 text-center max-w-sm w-full mx-4 transition-all duration-300 ease-out"
  [class.scale-105]="isDark()"
>
  <!-- Header Section -->
  <div class="space-y-3">
    <h1 class="text-5xl font-black tracking-tighter text-slate-900 dark:text-white transition-colors duration-300">
      {{ title() }}
    </h1>
    @if (subtitle()) {
      <p class="text-slate-700 dark:text-purple-200/70 font-medium transition-colors duration-300">
        {{ subtitle() }}: <span class="px-3 py-1 bg-white/20 rounded-full text-xs font-bold uppercase tracking-widest">{{ isDark() ? 'Dark' : 'Light' }}</span>
      </p>
    }
  </div>

  <!-- Interaction Slot -->
  <div class="flex items-center justify-center">
    <ng-content></ng-content>
  </div>

  <!-- Footer Tags Section -->
  <div class="pt-6 border-t border-white/10 w-full flex flex-col items-center gap-4 transition-all duration-300">
    <p class="text-[11px] text-slate-500 dark:text-purple-400 uppercase tracking-[0.2em] font-bold transition-colors">
      {{ footerLabel() }}
    </p>

    <div class="flex flex-wrap justify-center gap-2">
      @for (tag of tags(); track tag) {
        <span class="px-2 py-1 bg-black/5 dark:bg-white/10 rounded-md text-[9px] font-mono text-slate-600 dark:text-purple-300 transition-all duration-300 border border-white/10 uppercase">
          {{ tag }}
        </span>
      }
    </div>
  </div>
</div>
